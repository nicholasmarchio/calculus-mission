// ─── KaTeX inline component ───────────────────────────────────────────────────
function Tex({src}) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.katex) {
      try { window.katex.render(src, ref.current, {throwOnError:false, output:'html'}); }
      catch(e) { ref.current.textContent = src; }
    }
  });
  return h('span', {ref, style:{display:'inline'}});
}

// Render parts array: [{t:'t',c:'text'} | {t:'x',c:'latex'}]
function Parts({parts}) {
  return h('span', null, ...parts.map((p,i) =>
    p.t === 'x'
      ? h(Tex, {key:i, src:p.c})
      : h('span', {key:i, style:{whiteSpace:'pre-wrap'}}, p.c)
  ));
}

function dot(state) {
  const b = {width:26,height:26,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700,border:'2px solid',fontFamily:'monospace'};
  if(state==='active') return {...b,borderColor:C.a,color:C.a,boxShadow:'0 0 8px rgba(0,229,255,0.4)'};
  if(state==='ok')     return {...b,borderColor:C.green,background:'rgba(0,255,157,0.15)',color:C.green};
  if(state==='bad')    return {...b,borderColor:C.a2,background:'rgba(255,61,113,0.15)',color:C.a2};
  if(state==='skip')   return {...b,borderColor:C.gold,background:'rgba(255,215,0,0.1)',color:C.gold};
  return {...b,borderColor:C.dim,color:C.dim};
}

function optStyle(state) {
  const b = {background:C.p2,border:'2px solid rgba(0,229,255,0.15)',borderRadius:10,padding:'12px 14px',textAlign:'left',cursor:'pointer',display:'flex',gap:10,alignItems:'flex-start',color:C.text,fontSize:15,lineHeight:1.7,width:'100%',fontFamily:"Georgia,serif"};
  if(state==='ok')  return {...b,borderColor:C.green,background:'rgba(0,255,157,0.1)',cursor:'default'};
  if(state==='bad') return {...b,borderColor:C.a2,background:'rgba(255,61,113,0.1)',cursor:'default'};
  if(state==='dis') return {...b,opacity:.4,cursor:'default'};
  return b;
}

function btnStyle(v) {
  const b = {padding:'9px 18px',borderRadius:8,border:'none',cursor:'pointer',fontSize:11,fontWeight:700,letterSpacing:1,textTransform:'uppercase',fontFamily:'monospace'};
  if(v==='p') return {...b,background:'linear-gradient(135deg,#00e5ff,#007acc)',color:'#000',boxShadow:'0 4px 12px rgba(0,229,255,0.3)'};
  if(v==='h') return {...b,background:'transparent',color:C.a3,border:'1px solid rgba(162,89,255,0.4)'};
  if(v==='sk') return {...b,background:'transparent',color:C.gold,border:'1px solid rgba(255,215,0,0.3)',marginLeft:'auto'};
  return b;
}

// ─── Sub-components ───────────────────────────────────────────────────────────
function Hdr() {
  return h('div',{style:{textAlign:'center',padding:'24px 16px 18px',borderBottom:'1px solid rgba(0,229,255,0.2)',marginBottom:18}},
    h('div',{style:{fontSize:10,letterSpacing:4,color:C.a,textTransform:'uppercase',marginBottom:7,opacity:.8,...s.mono}},'⬡ AP Calculus AB · Top Secret Classification ⬡'),
    h('h1',{style:{fontSize:'clamp(19px,4vw,34px)',fontWeight:900,color:'#fff',textShadow:'0 0 28px rgba(0,229,255,0.5)',marginBottom:5,letterSpacing:2,...s.mono}},
      'OPERATION: ',h('span',{style:{color:C.a}},'DIFFERENTIAL')
    ),
    h('div',{style:{fontSize:12,color:C.dim,letterSpacing:1,...s.mono}},'60-Minute Calculus Intelligence Mission · Topics 35 & 36')
  );
}

function StatBar({timeLeft, score, correct, qi}) {
  const fmt = t => `${String(Math.floor(t/60)).padStart(2,'0')}:${String(t%60).padStart(2,'0')}`;
  const items = [
    {l:'⏱ Time Left', v:fmt(timeLeft), c:timeLeft<300?C.a2:C.a, pulse:timeLeft<300},
    {l:'⬡ Score', v:score, c:C.gold},
    {l:'✓ Correct', v:correct, c:C.green},
    {l:'◈ Question', v:`${qi+1}/${Q.length}`, c:C.a},
  ];
  return h('div',{style:{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap'}},
    ...items.map((item,i) =>
      h('div',{key:i,style:{flex:1,minWidth:80,background:C.panel,border:'1px solid rgba(0,229,255,0.2)',borderRadius:8,padding:'9px 12px',textAlign:'center'}},
        h('div',{style:{fontSize:9,letterSpacing:2,color:C.dim,textTransform:'uppercase',marginBottom:3,...s.mono}},item.l),
        h('div',{className:item.pulse?'pulse':'',style:{fontSize:20,fontWeight:700,color:item.c,...s.mono}},item.v)
      )
    )
  );
}

function Dots({results, qi, screen}) {
  const state = i => {
    if(i===qi && screen==='question') return 'active';
    const r = results[i];
    if(!r) return 'none';
    if(r.skipped) return 'skip';
    return r.correct?'ok':'bad';
  };
  return h('div',{style:{display:'flex',gap:5,marginBottom:18,flexWrap:'wrap'}},
    ...Q.map((_,i) => h('div',{key:i,style:dot(state(i))},i+1))
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [screen,  setScreen]  = useState('intro');
  const [qi,      setQi]      = useState(0);
  const [score,   setScore]   = useState(0);
  const [correct, setCorrect] = useState(0);
  const [results, setResults] = useState(Array(Q.length).fill(null));
  const [timeLeft,setTimeLeft]= useState(TOTAL);
  const [running, setRunning] = useState(false);
  const [sel,     setSel]     = useState(null);
  const [ans,     setAns]     = useState(false);
  const [hint,    setHint]    = useState(false);
  const [phase,   setPhase]   = useState(null);
  const timerRef = useRef(null);

  useEffect(() => {
    if (running) {
      timerRef.current = setInterval(() => {
        setTimeLeft(t => {
          if (t <= 1) { clearInterval(timerRef.current); setScreen('end'); return 0; }
          return t - 1;
        });
      }, 1000);
    }
    return () => clearInterval(timerRef.current);
  }, [running]);

  const q = Q[qi];
  const totalPts = Q.reduce((a,q) => a+q.points, 0);
  const pct = Math.round(score/totalPts*100);

  const getRank = () => {
    if(pct>=90) return {l:'🥇 FIELD COMMANDER',c:'#ffd700'};
    if(pct>=75) return {l:'🥈 SENIOR AGENT',c:'#c0c0c0'};
    if(pct>=55) return {l:'🥉 FIELD AGENT',c:'#cd7f32'};
    if(pct>=35) return {l:'🔰 RECRUIT',c:C.a};
    return {l:'🎯 CADET — KEEP TRAINING',c:C.dim};
  };

  const startGame = () => { setRunning(true); setPhase(1); setScreen('phaseIntro'); };
  const enterPhase = () => { setScreen('question'); setSel(null); setAns(false); setHint(false); };

  const doAnswer = idx => {
    if(ans) return;
    setSel(idx); setAns(true);
    const ok = idx === q.correct;
    const nr = [...results]; nr[qi] = {correct:ok, skipped:false}; setResults(nr);
    if(ok) { setScore(s => s+q.points); setCorrect(c => c+1); }
  };

  const doHint = () => {
    if(ans||hint) return;
    setHint(true); setScore(s => Math.max(0, s-5));
  };

  const doSkip = () => {
    if(ans) return;
    const nr = [...results]; nr[qi] = {correct:false, skipped:true}; setResults(nr);
    goNext(qi, nr);
  };

  const goNext = (from, res) => {
    res = res || results;
    const ni = from+1;
    if(ni >= Q.length) { setScreen('end'); return; }
    const np = Q[ni].phase, cp = Q[from].phase;
    setQi(ni); setSel(null); setAns(false); setHint(false);
    if(np !== cp) { setPhase(np); setScreen('phaseIntro'); }
    else setScreen('question');
  };

  // ── INTRO ──
  if(screen === 'intro') return h('div',{style:{background:C.bg,minHeight:'100vh',color:C.text,fontFamily:"Georgia,'Times New Roman',serif",paddingBottom:48}},
    h(Hdr),
    h('div',{style:s.wrap},
      h('div',{className:'card-anim',style:{...s.card,textAlign:'center'}},
        h('div',{style:s.cardBar}),
        h('div',{style:{fontSize:48,marginBottom:14}},'🛰️'),
        h('h2',{style:{fontSize:22,fontWeight:900,color:'#fff',marginBottom:10,...s.mono}},'MISSION BRIEFING'),
        h('p',{style:{fontSize:13,color:C.dim,lineHeight:1.75,maxWidth:480,margin:'0 auto 10px'}},
          "Complete 3 intelligence phases in 60 minutes. Earn points for correct answers — hints cost 5 points each."
        ),
        h('ul',{style:{textAlign:'left',background:C.p2,border:'1px solid rgba(0,229,255,0.2)',borderRadius:10,padding:'12px 18px',margin:'14px auto',maxWidth:480,listStyle:'none'}},
          ...['Phase 1 — Slope Field Recon (Q1–6)','Phase 2 — DEQ Combat (Q7–11)','Phase 3 — Growth & Decay Ops (Q12–16)','⭐ Star bonus questions = 20 pts','💡 Each hint costs 5 points'].map((o,i) =>
            h('li',{key:i,style:{padding:'4px 0',borderBottom:'1px solid rgba(255,255,255,0.04)',fontSize:13,display:'flex',gap:8}},
              h('span',{style:{color:C.a,flexShrink:0}},'▹'), o
            )
          )
        ),
        h('button',{className:'big-btn',style:s.bigBtn,onClick:startGame},'▶ ACCEPT MISSION')
      )
    )
  );

  // ── PHASE INTRO ──
  if(screen === 'phaseIntro') {
    const ph = PHASES[phase];
    const desc = {1:'Analyze slope fields, classify separable equations, and solve DEs.',2:'Find concavity, particular solutions, and solve IVPs.',3:'Model real-world growth and decay with exponential DEs.'};
    return h('div',{style:{background:C.bg,minHeight:'100vh',color:C.text,fontFamily:"Georgia,'Times New Roman',serif",paddingBottom:48}},
      h(Hdr),
      h('div',{style:s.wrap},
        h('div',{className:'card-anim',style:{...s.card,textAlign:'center'}},
          h('div',{style:s.cardBar}),
          h('div',{style:{fontSize:48,marginBottom:14}},ph.icon),
          h('h2',{style:{fontSize:22,fontWeight:900,color:ph.color,marginBottom:10,...s.mono}},`PHASE ${phase}: ${ph.label.toUpperCase()}`),
          h('p',{style:{fontSize:13,color:C.dim,lineHeight:1.75,maxWidth:460,margin:'0 auto 10px'}},desc[phase]),
          h('p',{style:{fontSize:13,color:C.a,marginTop:8}},'Regular: 10 pts \u00a0|\u00a0 ⭐ Star: 20 pts \u00a0|\u00a0 💡 Hint: −5 pts'),
          h('button',{className:'big-btn',style:{...s.bigBtn,background:`linear-gradient(135deg,${ph.color},#003366)`,color:'#000'},onClick:enterPhase},`ENTER PHASE ${phase}`)
        )
      )
    );
  }

  // ── QUESTION ──
  if(screen === 'question') {
    const os = i => !ans?'n': i===q.correct?'ok': i===sel?'bad':'dis';
    const ok = sel === q.correct;
    return h('div',{style:{background:C.bg,minHeight:'100vh',color:C.text,fontFamily:"Georgia,'Times New Roman',serif",paddingBottom:48}},
      h(Hdr),
      h('div',{style:s.wrap},
        h(StatBar,{timeLeft,score,correct,qi}),
        h(Dots,{results,qi,screen}),
        h('div',{style:{fontSize:10,letterSpacing:3,color:C.a3,textTransform:'uppercase',marginBottom:8,...s.mono}},q.phaseLabel),
        h('div',{className:'card-anim',style:s.card},
          h('div',{style:s.cardBar}),
          // Q header
          h('div',{style:{fontSize:10,letterSpacing:2,color:C.dim,marginBottom:12,...s.mono}},
            `QUESTION ${qi+1} OF ${Q.length}`,
            h('span',{style:{display:'inline-block',background:'rgba(0,229,255,0.1)',border:'1px solid rgba(0,229,255,0.3)',borderRadius:20,padding:'2px 10px',fontSize:10,color:C.a,marginLeft:8}},`${q.points} PTS`),
            q.star && h('span',{style:{color:C.gold,marginLeft:8,fontSize:10,...s.mono}},'⭐ BONUS')
          ),
          // Question text
          h('div',{style:{fontSize:16,lineHeight:1.95,color:'#e0f0ff',marginBottom:20}},h(Parts,{parts:q.text})),
          // Hint box
          hint && h('div',{style:{fontSize:13,color:'#7a9fc0',marginBottom:16,padding:'10px 14px',background:'rgba(162,89,255,0.08)',borderLeft:`3px solid ${C.a3}`,borderRadius:'0 6px 6px 0',lineHeight:1.8}},
            '💡 ', h('strong',null,'Hint: '), h(Parts,{parts:q.hint})
          ),
          // Options
          h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}},
            ...q.opts.map((opt,i) =>
              h('button',{key:i,className:'opt-btn',style:optStyle(os(i)),onClick:()=>doAnswer(i),disabled:ans},
                h('span',{style:{fontWeight:700,color:C.a,minWidth:18,fontSize:13,flexShrink:0,...s.mono}},'ABCD'[i]),
                h('span',{style:{lineHeight:1.8}},h(Parts,{parts:opt}))
              )
            )
          ),
          // Feedback
          ans && h('div',{style:{display:'flex',alignItems:'flex-start',gap:10,padding:'12px 16px',borderRadius:10,marginTop:12,background:ok?'rgba(0,255,157,0.1)':'rgba(255,61,113,0.1)',border:`1px solid ${ok?'rgba(0,255,157,0.4)':'rgba(255,61,113,0.4)'}`,color:ok?C.green:C.a2,fontSize:14,lineHeight:1.6}},
            h('span',{style:{fontSize:20,flexShrink:0}},ok?'✓':'✗'),
            h('span',null, h('strong',null,ok?`Correct! +${q.points} pts`:'Incorrect.'), ' — ', h(Parts,{parts:q.expl}))
          ),
          // Action buttons
          h('div',{style:{display:'flex',gap:10,marginTop:14,flexWrap:'wrap',alignItems:'center'}},
            !ans && h('button',{className:'act-btn',style:btnStyle('h'),onClick:doHint,disabled:hint},hint?'💡 Hint Used':'💡 Use Hint (−5 pts)'),
            ans  && h('button',{className:'act-btn',style:btnStyle('p'),onClick:()=>goNext(qi)},qi+1>=Q.length?'See Results →':'Next Question →'),
            !ans && h('button',{className:'act-btn',style:btnStyle('sk'),onClick:doSkip},'Skip ↷')
          )
        )
      )
    );
  }

  // ── END ──
  if(screen === 'end') {
    const rank = getRank();
    const tu = TOTAL-timeLeft, mm=Math.floor(tu/60), ss=tu%60;
    const skipped = results.filter(r=>r?.skipped).length;
    const bonus   = results.reduce((a,r,i)=>Q[i]?.star&&r?.correct?a+Q[i].points:a,0);
    const stats = [
      {l:'✓ Correct',v:correct,c:C.green},{l:'↷ Skipped',v:skipped,c:C.gold},
      {l:'⏱ Time',v:`${mm}m ${ss}s`,c:C.a},{l:'Score %',v:`${pct}%`,c:C.text},
      {l:'⭐ Bonus',v:bonus,c:C.gold},{l:'Total/Max',v:`${score}/${totalPts}`,c:C.a3},
    ];
    return h('div',{style:{background:C.bg,minHeight:'100vh',color:C.text,fontFamily:"Georgia,'Times New Roman',serif",paddingBottom:48}},
      h(Hdr),
      h('div',{style:s.wrap},
        h('div',{className:'card-anim',style:{...s.card,textAlign:'center'}},
          h('div',{style:s.cardBar}),
          h('div',{style:{fontSize:42,marginBottom:12}},'🏁'),
          h('h2',{style:{fontSize:21,fontWeight:900,color:'#fff',marginBottom:14,...s.mono}},'MISSION COMPLETE'),
          h('div',{style:{width:116,height:116,borderRadius:'50%',border:`4px solid ${C.gold}`,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',margin:'0 auto 16px',boxShadow:'0 0 28px rgba(255,215,0,0.3)'}},
            h('div',{style:{fontSize:32,fontWeight:900,color:C.gold,lineHeight:1,...s.mono}},score),
            h('div',{style:{fontSize:11,color:C.dim,...s.mono}},`/ ${totalPts} pts`)
          ),
          h('div',{style:{display:'inline-block',background:`${rank.c}22`,border:`1px solid ${rank.c}88`,borderRadius:20,padding:'7px 22px',color:rank.c,fontWeight:700,fontSize:13,marginBottom:18,...s.mono}},rank.l),
          h('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:20}},
            ...stats.map((x,i)=>
              h('div',{key:i,style:{background:C.p2,border:'1px solid rgba(0,229,255,0.15)',borderRadius:8,padding:10}},
                h('div',{style:{fontSize:9,color:C.dim,letterSpacing:1,textTransform:'uppercase',marginBottom:3,...s.mono}},x.l),
                h('div',{style:{fontSize:20,fontWeight:700,color:x.c,...s.mono}},x.v)
              )
            )
          ),
          // Debrief
          h('div',{style:{textAlign:'left',marginBottom:18}},
            h('div',{style:{fontSize:10,color:C.dim,letterSpacing:2,textTransform:'uppercase',marginBottom:8,...s.mono}},'Mission Debrief'),
            h('div',{style:{background:C.p2,borderRadius:10,border:'1px solid rgba(0,229,255,0.15)',overflow:'hidden'}},
              ...Q.map((q,i)=>{
                const r   = results[i];
                const ic  = !r?'⬜':r.skipped?'⟳':r.correct?'✅':'❌';
                const txt = q.text.filter(p=>p.t==='t').map(p=>p.c).join(' ').replace(/\n/g,' ').trim().substring(0,62)+'…';
                return h('div',{key:i,style:{display:'flex',gap:10,alignItems:'center',padding:'7px 14px',borderBottom:'1px solid rgba(255,255,255,0.04)',fontSize:12}},
                  h('span',{style:{color:C.dim,fontWeight:700,flexShrink:0,width:18,...s.mono}},i+1),
                  h('span',{style:{flex:1,color:'#8ab0cc',...s.mono}},txt),
                  h('span',{style:{flexShrink:0}},ic)
                );
              })
            )
          ),
          h('button',{className:'big-btn',style:s.bigBtn,onClick:()=>window.location.reload()},'↺ REPLAY MISSION')
        )
      )
    );
  }

  return null;
}

// ─── Mount ────────────────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(h(App));
</script>
</body>
</html>
