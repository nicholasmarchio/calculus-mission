  });

}

      {t:'t',c:'. At '},{t:'x',c:'t=0'},{t:'t',c:': 20% inoculated; at '},{t:'x',c:'t=3'},{t:'t',c:' weeks: 50%. How many MORE weeks until 80%?'},
    ],
    opts:[
      [{t:'x',c:'\\approx 2.8\\text{ more weeks}'}],
      [{t:'x',c:'\\approx 3.8\\text{ more weeks}'}],
      [{t:'x',c:'\\approx 5.8\\text{ more weeks}'}],
      [{t:'x',c:'\\approx 8.8\\text{ more weeks}'}],
    ],
    correct:1,
    hint:[
      {t:'t',c:'Solution: '},{t:'x',c:'P=100-Ce^{-kt}'},{t:'t',c:'. '},{t:'x',c:'P(0)=20\\Rightarrow C=80'},
      {t:'t',c:'. '},{t:'x',c:'P(3)=50\\Rightarrow k=\\tfrac{1}{3}\\ln\\tfrac{8}{5}'},{t:'t',c:'. Find '},{t:'x',c:'t'},{t:'t',c:' when '},{t:'x',c:'P=80'},{t:'t',c:' then subtract 3.'},
    ],
    expl:[
      {t:'t',c:'At '},{t:'x',c:'P=80'},{t:'t',c:': '},{t:'x',c:'t=\\dfrac{3\\ln4}{\\ln(8/5)}\\approx7.8'},{t:'t',c:' weeks. Additional: ≈4.8 weeks → closest answer ≈3.8 weeks ✓'},
    ],
  },
  {
    phase:3, phaseLabel:'Phase 3 · Growth & Decay Ops', star:false, points:10,
    text:[
      {t:'t',c:'You win $1,000/month forever and spend 5% of savings monthly. The DEQ is  '},
      {t:'x',c:'\\dfrac{dM}{dt}=1000-0.05M'},{t:'t',c:'  with  '},{t:'x',c:'M(0)=0'},
      {t:'t',c:'. As  '},{t:'x',c:'t\\to\\infty'},{t:'t',c:'  savings approaches:'},
    ],
    opts:[
      [{t:'x',c:'\\$20{,}000'}],
      [{t:'x',c:'\\$50{,}000'}],
      [{t:'x',c:'\\$100{,}000'}],
      [{t:'t',c:'Infinite'}],
    ],
    correct:0,
    hint:[
      {t:'t',c:'At equilibrium '},{t:'x',c:'\\dfrac{dM}{dt}=0'},{t:'t',c:': '},
      {t:'x',c:'1000=0.05M\\Rightarrow M=?'},{t:'t',c:'. This is where the solution converges.'},
    ],
    expl:[
      {t:'x',c:'M^*=\\dfrac{1000}{0.05}=\\$20{,}000'},{t:'t',c:'. General solution '},
      {t:'x',c:'M=20000(1-e^{-0.05t})\\to20000'},{t:'t',c:' as '},{t:'x',c:'t\\to\\infty'},{t:'t',c:' ✓'},
    ],
  },
];

const PHASES = {
  1:{label:'Slope Field Recon', icon:'🔭', color:'#00e5ff'},
  2:{label:'DEQ Combat', icon:'⚔️', color:'#ff3d71'},
  3:{label:'Growth & Decay Ops', icon:'📈', color:'#00ff9d'},
};
const TOTAL = 60*60;
const C = {bg:'#060a14',panel:'#0d1628',p2:'#0a1020',a:'#00e5ff',a2:'#ff3d71',a3:'#a259ff',gold:'#ffd700',green:'#00ff9d',text:'#cde4f7',dim:'#4a6080'};

// map shorthand t/x to text/tex
function renderParts(parts) {
  return parts.map((p,i) => p.t==='x' ? <Tex key={i}>{p.c}</Tex> : <span key={i} style={{whiteSpace:'pre-wrap'}}>{p.c}</span>);
}

export default function App() {
  const [screen,setScreen] = useState('intro');
  const [qi,setQi] = useState(0);
  const [score,setScore] = useState(0);
  const [correct,setCorrect] = useState(0);
  const [results,setResults] = useState(Array(Q.length).fill(null));
  const [timeLeft,setTimeLeft] = useState(TOTAL);
  const [running,setRunning] = useState(false);
  const [sel,setSel] = useState(null);
  const [ans,setAns] = useState(false);
  const [hint,setHint] = useState(false);
  const [phase,setPhase] = useState(null);
  const timer = useRef(null);

  useEffect(()=>{
    if(running){
      timer.current = setInterval(()=>{
        setTimeLeft(t=>{
          if(t<=1){clearInterval(timer.current);setScreen('end');return 0;}
          return t-1;
        });
      },1000);
    }
    return ()=>clearInterval(timer.current);
  },[running]);

  const fmt = s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  const q = Q[qi];
  const total = Q.reduce((s,q)=>s+q.points,0);
  const pct = Math.round(score/total*100);

  const rank = ()=>{
    if(pct>=90) return {l:'🥇 FIELD COMMANDER',c:'#ffd700'};
    if(pct>=75) return {l:'🥈 SENIOR AGENT',c:'#c0c0c0'};
    if(pct>=55) return {l:'🥉 FIELD AGENT',c:'#cd7f32'};
    if(pct>=35) return {l:'🔰 RECRUIT',c:C.a};
    return {l:'🎯 CADET — KEEP TRAINING',c:C.dim};
  };

  const startGame = ()=>{setRunning(true);setPhase(1);setScreen('phaseIntro');};
  const enterPhase = ()=>{setScreen('question');setSel(null);setAns(false);setHint(false);};

  const doAnswer = idx=>{
    if(ans) return;
    setSel(idx); setAns(true);
    const ok = idx===q.correct;
    const nr=[...results]; nr[qi]={correct:ok,skipped:false}; setResults(nr);
    if(ok){setScore(s=>s+q.points);setCorrect(c=>c+1);}
  };

  const doHint = ()=>{
    if(ans||hint) return;
    setHint(true); setScore(s=>Math.max(0,s-5));
  };

  const doSkip = ()=>{
    if(ans) return;
    const nr=[...results]; nr[qi]={correct:false,skipped:true}; setResults(nr);
    next(qi,nr);
  };

  const next = (from,res=results)=>{
    const ni=from+1;
    if(ni>=Q.length){setScreen('end');return;}
    const np=Q[ni].phase, cp=Q[from].phase;
    setQi(ni); setSel(null); setAns(false); setHint(false);
    if(np!==cp){setPhase(np);setScreen('phaseIntro');}
    else setScreen('question');
  };

  const dotState = i=>{
    if(i===qi&&screen==='question') return 'active';
    const r=results[i];
    if(!r) return 'none';
    if(r.skipped) return 'skip';
    return r.correct?'ok':'bad';
  };

  const dot = s=>{
    const b={width:26,height:26,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700,border:'2px solid',fontFamily:'monospace'};
    if(s==='active') return{...b,borderColor:C.a,color:C.a,boxShadow:'0 0 8px rgba(0,229,255,0.4)'};
    if(s==='ok')     return{...b,borderColor:C.green,background:'rgba(0,255,157,0.15)',color:C.green};
    if(s==='bad')    return{...b,borderColor:C.a2,background:'rgba(255,61,113,0.15)',color:C.a2};
    if(s==='skip')   return{...b,borderColor:C.gold,background:'rgba(255,215,0,0.1)',color:C.gold};
    return{...b,borderColor:C.dim,color:C.dim};
  };

  const optS = s=>{
    const b={background:C.p2,border:'2px solid rgba(0,229,255,0.15)',borderRadius:10,padding:'12px 14px',textAlign:'left',cursor:'pointer',display:'flex',gap:10,alignItems:'flex-start',color:C.text,fontSize:15,lineHeight:1.7,width:'100%',fontFamily:'Georgia,serif'};
    if(s==='ok')  return{...b,borderColor:C.green,background:'rgba(0,255,157,0.1)',cursor:'default'};
    if(s==='bad') return{...b,borderColor:C.a2,background:'rgba(255,61,113,0.1)',cursor:'default'};
    if(s==='dis') return{...b,opacity:.4,cursor:'default'};
    return b;
  };

  const btn = v=>{
    const b={padding:'9px 18px',borderRadius:8,border:'none',cursor:'pointer',fontSize:11,fontWeight:700,letterSpacing:1,textTransform:'uppercase',fontFamily:'monospace'};
    if(v==='p') return{...b,background:'linear-gradient(135deg,#00e5ff,#007acc)',color:'#000',boxShadow:'0 4px 12px rgba(0,229,255,0.3)'};
    if(v==='h') return{...b,background:'transparent',color:C.a3,border:'1px solid rgba(162,89,255,0.4)'};
    if(v==='s') return{...b,background:'transparent',color:C.gold,border:'1px solid rgba(255,215,0,0.3)',marginLeft:'auto'};
    return b;
  };

  const Hdr = ()=>(
    <div style={{textAlign:'center',padding:'24px 16px 18px',borderBottom:'1px solid rgba(0,229,255,0.2)',marginBottom:18}}>
      <div style={{fontSize:10,letterSpacing:4,color:C.a,textTransform:'uppercase',marginBottom:7,opacity:.8,fontFamily:'monospace'}}>⬡ AP Calculus AB · Top Secret Classification ⬡</div>
      <h1 style={{fontSize:'clamp(19px,4vw,34px)',fontWeight:900,color:'#fff',textShadow:'0 0 28px rgba(0,229,255,0.5)',marginBottom:5,letterSpacing:2,fontFamily:'monospace'}}>
        OPERATION: <span style={{color:C.a}}>DIFFERENTIAL</span>
      </h1>
      <div style={{fontSize:12,color:C.dim,letterSpacing:1,fontFamily:'monospace'}}>60-Minute Calculus Intelligence Mission · Topics 35 &amp; 36</div>
    </div>
  );

  const Wrap = ({children})=>(
    <div style={{maxWidth:820,margin:'0 auto',padding:'0 14px'}}>{children}</div>
  );

  const StatBar = ()=>(
    <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap'}}>
      {[
        {l:'⏱ Time Left',v:fmt(timeLeft),c:timeLeft<300?C.a2:C.a},
        {l:'⬡ Score',v:score,c:C.gold},
        {l:'✓ Correct',v:correct,c:C.green},
        {l:'◈ Question',v:`${qi+1}/${Q.length}`,c:C.a},
      ].map((s,i)=>(
        <div key={i} style={{flex:1,minWidth:80,background:C.panel,border:'1px solid rgba(0,229,255,0.2)',borderRadius:8,padding:'9px 12px',textAlign:'center'}}>
          <div style={{fontSize:9,letterSpacing:2,color:C.dim,textTransform:'uppercase',marginBottom:3,fontFamily:'monospace'}}>{s.l}</div>
          <div style={{fontSize:20,fontWeight:700,color:s.c,fontFamily:'monospace'}}>{s.v}</div>
        </div>
      ))}
    </div>
  );

  const Dots = ()=>(
    <div style={{display:'flex',gap:5,marginBottom:18,flexWrap:'wrap'}}>
      {Q.map((_,i)=><div key={i} style={dot(dotState(i))}>{i+1}</div>)}
    </div>
  );

  const Card = ({children,center})=>(
    <div style={{background:C.panel,border:'1px solid rgba(0,229,255,0.2)',borderRadius:12,padding:'22px 24px',marginBottom:18,position:'relative',overflow:'hidden',textAlign:center?'center':'left'}}>
      <div style={{position:'absolute',top:0,left:0,right:0,height:3,background:'linear-gradient(90deg,#a259ff,#00e5ff,#00ff9d)'}}/>
      {children}
    </div>
  );

  if(screen==='intro') return (
    <div style={{background:C.bg,minHeight:'100vh',color:C.text,fontFamily:"Georgia,'Times New Roman',serif",paddingBottom:48}}>
      <Hdr/>
      <Wrap>
        <Card center>
          <div style={{fontSize:48,marginBottom:14}}>🛰️</div>
          <h2 style={{fontSize:22,fontWeight:900,color:'#fff',marginBottom:10,fontFamily:'monospace'}}>MISSION BRIEFING</h2>
          <p style={{fontSize:13,color:C.dim,lineHeight:1.7,maxWidth:480,margin:'0 auto 10px'}}>
            Agent, complete 3 intelligence phases in 60 minutes. Earn points for correct answers — hints cost 5 points each.
          </p>
          <ul style={{textAlign:'left',background:C.p2,border:'1px solid rgba(0,229,255,0.2)',borderRadius:10,padding:'12px 18px',margin:'14px auto',maxWidth:480,listStyle:'none'}}>
            {['Phase 1 — Slope Field Recon (Q1–6)','Phase 2 — DEQ Combat (Q7–11)','Phase 3 — Growth & Decay Ops (Q12–16)','⭐ Star bonus questions = 20 pts','💡 Each hint costs 5 points'].map((o,i)=>(
              <li key={i} style={{padding:'4px 0',borderBottom:'1px solid rgba(255,255,255,0.04)',fontSize:13,display:'flex',gap:8}}>
                <span style={{color:C.a,flexShrink:0}}>▹</span>{o}
              </li>
            ))}
          </ul>
          <button className="big-btn" style={{padding:'12px 32px',borderRadius:10,border:'none',cursor:'pointer',fontSize:12,fontWeight:900,letterSpacing:2,textTransform:'uppercase',background:'linear-gradient(135deg,#00e5ff,#0080ff)',color:'#000',boxShadow:'0 8px 24px rgba(0,229,255,0.35)',marginTop:12,fontFamily:'monospace'}} onClick={startGame}>
            ▶ ACCEPT MISSION
          </button>
        </Card>
      </Wrap>
    </div>
  );

  if(screen==='phaseIntro'){
    const ph=PHASES[phase];
    const desc={1:'Analyze slope fields, classify separable equations, and solve DEs.',2:'Find concavity, particular solutions, and solve IVPs.',3:'Model real-world growth and decay with exponential DEs.'};
    return (
      <div style={{background:C.bg,minHeight:'100vh',color:C.text,fontFamily:"Georgia,'Times New Roman',serif",paddingBottom:48}}>
        <Hdr/>
        <Wrap>
          <Card center>
            <div style={{fontSize:48,marginBottom:14}}>{ph.icon}</div>
            <h2 style={{fontSize:22,fontWeight:900,color:ph.color,marginBottom:10,fontFamily:'monospace'}}>PHASE {phase}: {ph.label.toUpperCase()}</h2>
            <p style={{fontSize:13,color:C.dim,lineHeight:1.7,maxWidth:460,margin:'0 auto 10px'}}>{desc[phase]}</p>
            <p style={{fontSize:13,color:C.a,marginTop:8}}>Regular: 10 pts &nbsp;|&nbsp; ⭐ Star: 20 pts &nbsp;|&nbsp; 💡 Hint: −5 pts</p>
            <button className="big-btn" style={{padding:'12px 32px',borderRadius:10,border:'none',cursor:'pointer',fontSize:12,fontWeight:900,letterSpacing:2,textTransform:'uppercase',background:`linear-gradient(135deg,${ph.color},#003366)`,color:'#000',boxShadow:'0 8px 24px rgba(0,0,0,0.4)',marginTop:14,fontFamily:'monospace'}} onClick={enterPhase}>
              ENTER PHASE {phase}
            </button>
          </Card>
        </Wrap>
      </div>
    );
  }

  if(screen==='question'){
    const os = i=>!ans?'n':i===q.correct?'ok':i===sel?'bad':'dis';
    const ok = sel===q.correct;
    return (
      <div style={{background:C.bg,minHeight:'100vh',color:C.text,fontFamily:"Georgia,'Times New Roman',serif",paddingBottom:48}}>
        <Hdr/>
        <Wrap>
          <StatBar/>
          <Dots/>
          <div style={{fontSize:10,letterSpacing:3,color:C.a3,textTransform:'uppercase',marginBottom:8,fontFamily:'monospace'}}>{q.phaseLabel}</div>
          <Card>
            <div style={{fontSize:10,letterSpacing:2,color:C.dim,marginBottom:12,fontFamily:'monospace'}}>
              QUESTION {qi+1} OF {Q.length}
              <span style={{display:'inline-block',background:'rgba(0,229,255,0.1)',border:'1px solid rgba(0,229,255,0.3)',borderRadius:20,padding:'2px 10px',fontSize:10,color:C.a,marginLeft:8}}>{q.points} PTS</span>
              {q.star&&<span style={{color:C.gold,marginLeft:8,fontFamily:'monospace',fontSize:10}}>⭐ BONUS</span>}
            </div>
            <div style={{fontSize:16,lineHeight:1.9,color:'#e0f0ff',marginBottom:20}}>
              {renderParts(q.text)}
            </div>
            {hint&&(
              <div style={{fontSize:13,color:'#7a9fc0',marginBottom:16,padding:'10px 14px',background:'rgba(162,89,255,0.08)',borderLeft:`3px solid ${C.a3}`,borderRadius:'0 6px 6px 0',lineHeight:1.8}}>
                💡 <strong>Hint:</strong> {renderParts(q.hint)}
              </div>
            )}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              {q.opts.map((opt,i)=>(
                <button key={i} className="opt-btn" style={optS(os(i))} onClick={()=>doAnswer(i)} disabled={ans}>
                  <span style={{fontWeight:700,color:C.a,minWidth:18,fontSize:13,fontFamily:'monospace',flexShrink:0}}>{'ABCD'[i]}</span>
                  <span style={{lineHeight:1.8}}>{renderParts(opt)}</span>
                </button>
              ))}
            </div>
            {ans&&(
              <div style={{display:'flex',alignItems:'flex-start',gap:10,padding:'12px 16px',borderRadius:10,marginTop:12,background:ok?'rgba(0,255,157,0.1)':'rgba(255,61,113,0.1)',border:`1px solid ${ok?'rgba(0,255,157,0.4)':'rgba(255,61,113,0.4)'}`,color:ok?C.green:C.a2,fontSize:14,lineHeight:1.6}}>
                <span style={{fontSize:20,flexShrink:0}}>{ok?'✓':'✗'}</span>
                <span><strong>{ok?`Correct! +${q.points} pts`:'Incorrect.'}</strong>{' — '}{renderParts(q.expl)}</span>
              </div>
            )}
            <div style={{display:'flex',gap:10,marginTop:14,flexWrap:'wrap',alignItems:'center'}}>
              {!ans&&<button className="action-btn" style={btn('h')} onClick={doHint} disabled={hint}>{hint?'💡 Hint Used':'💡 Use Hint (−5 pts)'}</button>}
              {ans&&<button className="action-btn" style={btn('p')} onClick={()=>next(qi)}>{qi+1>=Q.length?'See Results →':'Next Question →'}</button>}
              {!ans&&<button className="action-btn" style={btn('s')} onClick={doSkip}>Skip ↷</button>}
            </div>
          </Card>
        </Wrap>
      </div>
    );
  }

  if(screen==='end'){
    const r=rank();
    const tu=TOTAL-timeLeft, mm=Math.floor(tu/60), ss=tu%60;
    const skipped=results.filter(r=>r?.skipped).length;
    const bonus=results.reduce((a,r,i)=>Q[i]?.star&&r?.correct?a+Q[i].points:a,0);
    return (
      <div style={{background:C.bg,minHeight:'100vh',color:C.text,fontFamily:"Georgia,'Times New Roman',serif",paddingBottom:48}}>
        <Hdr/>
        <Wrap>
          <Card center>
            <div style={{fontSize:42,marginBottom:12}}>🏁</div>
            <h2 style={{fontSize:21,fontWeight:900,color:'#fff',marginBottom:14,fontFamily:'monospace'}}>MISSION COMPLETE</h2>
            <div style={{width:116,height:116,borderRadius:'50%',border:`4px solid ${C.gold}`,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',margin:'0 auto 16px',boxShadow:'0 0 28px rgba(255,215,0,0.3)'}}>
              <div style={{fontSize:32,fontWeight:900,color:C.gold,lineHeight:1,fontFamily:'monospace'}}>{score}</div>
              <div style={{fontSize:11,color:C.dim,fontFamily:'monospace'}}>/ {total} pts</div>
            </div>
            <div style={{display:'inline-block',background:`${r.c}22`,border:`1px solid ${r.c}88`,borderRadius:20,padding:'7px 22px',color:r.c,fontWeight:700,fontSize:13,marginBottom:18,fontFamily:'monospace'}}>{r.l}</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:20}}>
              {[{l:'✓ Correct',v:correct,c:C.green},{l:'↷ Skipped',v:skipped,c:C.gold},{l:'⏱ Time',v:`${mm}m ${ss}s`,c:C.a},{l:'Score %',v:`${pct}%`,c:C.text},{l:'⭐ Bonus',v:bonus,c:C.gold},{l:'Total/Max',v:`${score}/${total}`,c:C.a3}].map((x,i)=>(
                <div key={i} style={{background:C.p2,border:'1px solid rgba(0,229,255,0.15)',borderRadius:8,padding:10}}>
                  <div style={{fontSize:9,color:C.dim,letterSpacing:1,textTransform:'uppercase',marginBottom:3,fontFamily:'monospace'}}>{x.l}</div>
                  <div style={{fontSize:20,fontWeight:700,color:x.c,fontFamily:'monospace'}}>{x.v}</div>
                </div>
              ))}
            </div>
            <div style={{textAlign:'left',marginBottom:18}}>
              <div style={{fontSize:10,color:C.dim,letterSpacing:2,textTransform:'uppercase',marginBottom:8,fontFamily:'monospace'}}>Mission Debrief</div>
              <div style={{background:C.p2,borderRadius:10,border:'1px solid rgba(0,229,255,0.15)',overflow:'hidden'}}>
                {Q.map((q,i)=>{
                  const res=results[i];
                  const ic=!res?'⬜':res.skipped?'⟳':res.correct?'✅':'❌';
                  const txt=q.text.filter(p=>p.t==='t').map(p=>p.c).join(' ').replace(/\n/g,' ').trim().substring(0,62)+'…';
                  return (
                    <div key={i} style={{display:'flex',gap:10,alignItems:'center',padding:'7px 14px',borderBottom:'1px solid rgba(255,255,255,0.04)',fontSize:12}}>
                      <span style={{color:C.dim,fontWeight:700,flexShrink:0,width:18,fontFamily:'monospace'}}>{i+1}</span>
                      <span style={{flex:1,color:'#8ab0cc',fontFamily:'monospace'}}>{txt}</span>
                      <span style={{flexShrink:0}}>{ic}</span>
                    </div>
                  );
                })}
              </div>
            </div>
            <button className="big-btn" style={{padding:'12px 32px',borderRadius:10,border:'none',cursor:'pointer',fontSize:12,fontWeight:900,letterSpacing:2,textTransform:'uppercase',background:'linear-gradient(135deg,#00e5ff,#0080ff)',color:'#000',boxShadow:'0 8px 24px rgba(0,229,255,0.35)',marginTop:12,fontFamily:'monospace'}} onClick={()=>window.location.reload()}>
              ↺ REPLAY MISSION
            </button>
          </Card>
        </Wrap>
      </div>
    );
  }
  return null;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);

// Hide loading screen once React renders
setTimeout(()=>{
  const el = document.getElementById('loading');
  if(el){el.style.opacity='0'; setTimeout(()=>el.remove(),500);}
},1200);
</script>
</body>
</html>
